name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: read

jobs:
  hacs:
    name: HACS
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main, resolved 2026-06-19
        with:
          category: integration

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: home-assistant/actions/hassfest@e91ad1948e57189485b9c1ad608af0c303946f89 # master, resolved 2026-06-19

  python:
    name: Python / HA ${{ matrix.ha-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ha-version: "2025.12.5"
            ha-image: ghcr.io/home-assistant/home-assistant:2025.12.5
          - ha-version: stable
            ha-image: ghcr.io/home-assistant/home-assistant:stable
    container: ${{ matrix.ha-image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .[dev] -r requirements-manifest.txt
      - run: python -m pip_audit -r requirements-manifest.txt --progress-spinner off
      - run: python -m ruff format --check custom_components tests tools
      - run: python -m ruff check custom_components tests tools
      - run: MYPYPATH=/usr/src/homeassistant python -m mypy
      - run: python -m pytest --cov=custom_components.ok --cov-report=term-missing
      - run: python -c "from custom_components.ok.api._firestore import _close_owned_firestore_client, _create_default_firestore_client; client = _create_default_firestore_client(project_id='ok-ci-smoke', credentials=None); _close_owned_firestore_client(client)"
      - run: python -m build --outdir /tmp/dist
      - run: python -m twine check /tmp/dist/*
      - run: python -m pip install --force-reinstall --no-deps /tmp/dist/*.whl
      - run: cd /tmp && python -c "import custom_components.ok.api as ok_api; print(ok_api.__version__); assert 'site-packages' in ok_api.__file__"

  api-client:
    name: Bundled API client / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"
          - "3.14"
    container: python:${{ matrix.python-version }}-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[firebase,dev]"
      - run: python -m pip_audit --progress-spinner off
      - name: Compile bundled API client
        run: |
          python - <<'PY'
          from __future__ import annotations

          import py_compile
          from pathlib import Path

          for path in sorted(Path("custom_components/ok/api").glob("*.py")):
              py_compile.compile(path, doraise=True)
          PY
      - name: Import bundled API client standalone
        run: |
          mkdir -p /tmp/ok-api-client
          cp -R custom_components/ok/api /tmp/ok-api-client/api
          PYTHONPATH=/tmp/ok-api-client python - <<'PY'
          from __future__ import annotations

          import api as ok_api
          from api import AsyncOkApiClient, OkApiClient

          print(ok_api.__version__)
          assert AsyncOkApiClient
          assert OkApiClient
          PY
      - run: python -m build --outdir /tmp/dist
      - run: python -m twine check /tmp/dist/*
