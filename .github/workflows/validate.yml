name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"
  PIP_ROOT_USER_ACTION: ignore

jobs:
  workflow-permissions:
    name: Workflow Permissions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Restrict write-capable workflows
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          from pathlib import Path
          import re
          import sys

          allowed: set[Path] = set()
          contents_write = re.compile(r"^\s*contents\s*:\s*['\"]?write['\"]?\s*$", re.I)
          write_all = re.compile(r"^\s*permissions\s*:\s*['\"]?write-all['\"]?\s*$", re.I)
          errors: list[str] = []

          for path in sorted(Path(".github/workflows").glob("*.yml")) + sorted(
              Path(".github/workflows").glob("*.yaml")
          ):
              for line_number, raw_line in enumerate(path.read_text().splitlines(), 1):
                  line = raw_line.split("#", 1)[0]
                  if write_all.fullmatch(line.strip()):
                      errors.append(f"{path}:{line_number}: permissions: write-all is not allowed")
                  if contents_write.fullmatch(line.strip()) and path not in allowed:
                      errors.append(
                          f"{path}:{line_number}: contents: write is not allowed for GITHUB_TOKEN"
                      )

          if errors:
              print("\n".join(errors), file=sys.stderr)
              sys.exit(1)
          PY

  hacs:
    name: HACS
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main, resolved 2026-06-19
        with:
          category: integration

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: home-assistant/actions/hassfest@e91ad1948e57189485b9c1ad608af0c303946f89 # master, resolved 2026-06-19

  python:
    name: Python / HA ${{ matrix.ha-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ha-version: "2025.12.5"
            ha-image: ghcr.io/home-assistant/home-assistant:2025.12.5
          - ha-version: stable
            ha-image: ghcr.io/home-assistant/home-assistant:stable
    container: ${{ matrix.ha-image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: python -m pip install -e ".[firebase]" -r requirements-manifest.txt "pytest>=8.4,<10" "pytest-asyncio>=1.1,<2" "pytest-cov>=6.2,<8"
      - run: python -m pytest --cov=custom_components.ok --cov-report=term-missing
      - run: python -c "from custom_components.ok.api._firestore import _close_owned_firestore_client, _create_default_firestore_client; client = _create_default_firestore_client(project_id='ok-ci-smoke', credentials=None); _close_owned_firestore_client(client)"

  type-check:
    name: Type Check / HA 2025.12.5
    runs-on: ubuntu-latest
    container: ghcr.io/home-assistant/home-assistant:2025.12.5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: python -m pip install -e ".[firebase]" -r requirements-manifest.txt "mypy>=1.17,<3"
      - run: MYPYPATH=/usr/src/homeassistant python -m mypy

  quality:
    name: Python Quality / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip "build>=1.2,<2" "pip-audit>=2.9,<3" "ruff>=0.12,<1" "twine>=6.0,<7"
      - run: python -m ruff format --check custom_components tests tools
      - run: python -m ruff check custom_components tests tools
      - name: Build audit requirements
        run: |
          python - <<'PY' > /tmp/ok-audit-requirements.txt
          from __future__ import annotations

          from pathlib import Path
          import tomllib

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          for dependency in pyproject["project"]["dependencies"]:
              print(dependency)
          for line in Path("requirements-manifest.txt").read_text().splitlines():
              stripped = line.strip()
              if stripped and not stripped.startswith("#"):
                  print(stripped)
          PY
      - run: python -m pip_audit -r /tmp/ok-audit-requirements.txt --progress-spinner off
      - run: python -m build --outdir /tmp/dist
      - run: python -m twine check /tmp/dist/*
      - name: Check package contents
        run: |
          python - <<'PY'
          from __future__ import annotations

          from pathlib import Path
          import zipfile

          wheel = next(Path("/tmp/dist").glob("*.whl"))
          required = {
              "custom_components/ok/__init__.py",
              "custom_components/ok/manifest.json",
              "custom_components/ok/api/__init__.py",
              "custom_components/ok/py.typed",
              "custom_components/ok/translations/en.json",
          }
          with zipfile.ZipFile(wheel) as archive:
              names = set(archive.namelist())
          if missing := sorted(required - names):
              raise SystemExit(f"Wheel is missing required files: {missing}")
          PY

  api-client:
    name: Bundled API client / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[firebase]" -r requirements-manifest.txt "pytest>=8.4,<10" "pytest-asyncio>=1.1,<2"
      - name: Compile bundled API client
        run: |
          python - <<'PY'
          from __future__ import annotations

          import py_compile
          from pathlib import Path

          for path in sorted(Path("custom_components/ok/api").glob("*.py")):
              py_compile.compile(path, doraise=True)
          PY
      - name: Import bundled API client standalone
        run: |
          mkdir -p /tmp/ok-api-client
          cp -R custom_components/ok/api /tmp/ok-api-client/api
          PYTHONPATH=/tmp/ok-api-client python - <<'PY'
          from __future__ import annotations

          import api as ok_api
          from api import AsyncOkApiClient, OkApiClient

          print(ok_api.__version__)
          assert AsyncOkApiClient
          assert OkApiClient
          PY
      - name: Run bundled API client tests
        run: |
          python -m pytest \
            tests/test_client_async.py \
            tests/test_client_sync.py \
            tests/test_firestore.py \
            tests/test_package_metadata.py \
            tests/test_signing.py
