name: Conventional Commits

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - edited
      - opened
      - ready_for_review
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      title:
        description: Conventional Commit title to validate
        required: true
        type: string

permissions: {}

jobs:
  conventional-commit:
    name: Conventional Commit
    runs-on: ubuntu-latest
    steps:
      - name: Validate title or commit message
        env:
          INPUT_TITLE: ${{ inputs.title }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path
          import re
          import sys

          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text())
          candidates: list[str] = []
          if title := event.get("pull_request", {}).get("title"):
              candidates.append(title)
          elif title := os.environ.get("INPUT_TITLE"):
              candidates.append(title)
          elif commits := event.get("commits"):
              candidates.extend(commit.get("message", "") for commit in commits)
          elif message := event.get("head_commit", {}).get("message"):
              candidates.append(message)
          else:
              print("No pull request title or commit message found to validate.")
              sys.exit(1)

          pattern = re.compile(
              r"^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)"
              r"(\([^)]+\))?!?: .+"
          )

          invalid = [
              candidate.splitlines()[0]
              for candidate in candidates
              if not pattern.fullmatch(candidate.splitlines()[0])
          ]
          if not invalid:
              sys.exit(0)

          print("Pull request title or commit message must use Conventional Commits.")
          print("Examples:")
          print("  feat: add charger diagnostics")
          print("  fix(sensor): handle missing session cost")
          print("  docs!: document breaking setup change")
          for title in invalid:
              print(f"Received: {title!r}")
          sys.exit(1)
          PY
