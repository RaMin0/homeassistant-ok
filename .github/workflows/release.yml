name: Release

on:
  workflow_run:
    workflows:
      - Validate
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release-token:
    name: Release Token
    if: >-
      ${{
        github.event.repository.private == false &&
        (
          github.event_name == 'workflow_dispatch' ||
          (
            github.event_name == 'workflow_run' &&
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.event == 'push' &&
            github.event.workflow_run.head_branch == 'main'
          )
        )
      }}
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.release_token.outputs.configured }}
    steps:
      - name: Check release token
        id: release_token
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "Release token secret is not configured; skipping release."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Semantic Release
    needs: release-token
    if: ${{ needs.release-token.outputs.configured == 'true' }}
    runs-on: ubuntu-latest
    env:
      COMPONENT_PATH: custom_components/ok
      RELEASE_ASSET_NAME: ok.zip
    steps:
      - name: Require main branch for manual releases
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name != 'main' }}
        run: |
          echo "Manual releases must run from main."
          exit 1

      - name: Checkout release branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Confirm validated commit
        id: validated_commit
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          actual_sha="$(git rev-parse HEAD)"
          if [ "$actual_sha" != "$EXPECTED_SHA" ]; then
            echo "main moved after Validate completed."
            echo "Expected: $EXPECTED_SHA"
            echo "Actual:   $actual_sha"
            echo "Skipping release for this superseded validation run."
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "stale=false" >> "$GITHUB_OUTPUT"

      - name: Semantic version release
        id: release
        if: ${{ github.event_name != 'workflow_run' || steps.validated_commit.outputs.stale != 'true' }}
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          build: "false"
          github_token: ${{ secrets.RELEASE_TOKEN }}
          git_committer_name: github-actions[bot]
          git_committer_email: 41898282+github-actions[bot]@users.noreply.github.com
          changelog: "true"
          push: "true"
          vcs_release: "true"

      - name: Stop when validation run is superseded
        if: ${{ github.event_name == 'workflow_run' && steps.validated_commit.outputs.stale == 'true' }}
        run: echo "No release needed because a newer main commit has already been validated."

      - name: Stop when no release is needed
        if: >-
          ${{
            (github.event_name != 'workflow_run' || steps.validated_commit.outputs.stale != 'true') &&
            steps.release.outputs.released != 'true'
          }}
        run: echo "No release needed for this commit."

      - name: Check out released commit
        if: ${{ steps.release.outputs.released == 'true' }}
        run: |
          git fetch origin main --depth=1
          git checkout --force "${{ steps.release.outputs.commit_sha }}"

      - name: Create HACS release asset
        if: ${{ steps.release.outputs.released == 'true' }}
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import os
          from pathlib import Path
          import zipfile

          component_path = Path(os.environ["COMPONENT_PATH"])
          asset_path = Path(os.environ["RUNNER_TEMP"]) / os.environ["RELEASE_ASSET_NAME"]
          asset_path.unlink(missing_ok=True)
          with zipfile.ZipFile(asset_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for path in sorted(component_path.rglob("*")):
                  if not path.is_file():
                      continue
                  if "__pycache__" in path.parts or path.suffix == ".pyc":
                      continue
                  archive.write(path, path.relative_to(component_path))
          with zipfile.ZipFile(asset_path) as archive:
              if bad_file := archive.testzip():
                  raise RuntimeError(f"Created corrupt zip member: {bad_file}")
          PY

      - name: Upload HACS release asset
        if: ${{ steps.release.outputs.released == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release upload \
            "${{ steps.release.outputs.tag }}" \
            "${RUNNER_TEMP}/${RELEASE_ASSET_NAME}" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Summarize release
        if: ${{ steps.release.outputs.released == 'true' }}
        run: |
          {
            echo "Released ${{ steps.release.outputs.tag }}"
            echo
            echo "- Version: ${{ steps.release.outputs.version }}"
            echo "- Changelog: CHANGELOG.md"
            echo "- HACS asset: ${RELEASE_ASSET_NAME}"
            echo "- Release URL: ${{ steps.release.outputs.link }}"
          } >> "$GITHUB_STEP_SUMMARY"
