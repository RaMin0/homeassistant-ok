name: Release

on:
  release:
    types:
      - published
  workflow_run:
    workflows:
      - Validate
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    if: >-
      ${{
        github.event.repository.private == false &&
        (
          github.event_name == 'workflow_dispatch' ||
          (
            github.event_name == 'workflow_run' &&
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.event == 'push' &&
            github.event.workflow_run.head_branch == 'main'
          )
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      COMPONENT_PATH: custom_components/ok
      RELEASE_ASSET_NAME: ok.zip
    steps:
      - name: Require main branch for manual releases
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name != 'main' }}
        run: |
          echo "Manual releases must run from main."
          exit 1

      - name: Checkout release branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Confirm validated commit
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          actual_sha="$(git rev-parse HEAD)"
          if [ "$actual_sha" != "$EXPECTED_SHA" ]; then
            echo "main moved after Validate completed."
            echo "Expected: $EXPECTED_SHA"
            echo "Actual:   $actual_sha"
            exit 1
          fi

      - name: Semantic version release
        id: release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          build: "false"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: github-actions[bot]
          git_committer_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit: "false"
          changelog: "false"
          push: "true"
          vcs_release: "true"

      - name: Stop when no release is needed
        if: ${{ steps.release.outputs.released != 'true' }}
        run: echo "No release needed for this commit."

      - name: Summarize release
        if: ${{ steps.release.outputs.released == 'true' }}
        run: |
          {
            echo "Released ${{ steps.release.outputs.tag }}"
            echo
            echo "- Version: ${{ steps.release.outputs.version }}"
            echo "- Release notes: GitHub release"
            echo "- HACS asset: uploaded by the release event workflow"
            echo "- Release URL: ${{ steps.release.outputs.link }}"
          } >> "$GITHUB_STEP_SUMMARY"

  release-asset:
    name: HACS Release Asset
    if: ${{ github.event_name == 'release' && github.event.repository.private == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      COMPONENT_PATH: custom_components/ok
      RELEASE_ASSET_NAME: ok.zip
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Check out released tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Stamp release version into asset files
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path
          import re

          version = os.environ["RELEASE_TAG"]
          if version.startswith("v"):
              version = version[1:]

          manifest_path = Path("custom_components/ok/manifest.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          manifest["version"] = version
          manifest_path.write_text(
              json.dumps(manifest, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )

          version_path = Path("custom_components/ok/api/_version.py")
          version_path.write_text(
              re.sub(
                  r'__version__ = "[^"]+"',
                  f'__version__ = "{version}"',
                  version_path.read_text(encoding="utf-8"),
              ),
              encoding="utf-8",
          )
          PY

      - name: Create HACS release asset
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import os
          from pathlib import Path
          import zipfile

          component_path = Path(os.environ["COMPONENT_PATH"])
          asset_path = Path(os.environ["RUNNER_TEMP"]) / os.environ["RELEASE_ASSET_NAME"]
          asset_path.unlink(missing_ok=True)
          with zipfile.ZipFile(asset_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for path in sorted(component_path.rglob("*")):
                  if not path.is_file():
                      continue
                  if "__pycache__" in path.parts or path.suffix == ".pyc":
                      continue
                  archive.write(path, path.relative_to(component_path))
          with zipfile.ZipFile(asset_path) as archive:
              if bad_file := archive.testzip():
                  raise RuntimeError(f"Created corrupt zip member: {bad_file}")
          PY

      - name: Upload HACS release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "$RELEASE_TAG" \
            "${RUNNER_TEMP}/${RELEASE_ASSET_NAME}" \
            --repo "${{ github.repository }}" \
            --clobber
