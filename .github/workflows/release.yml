name: Release

on:
  workflow_run:
    workflows:
      - Validate
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    if: >-
      ${{
        github.event.repository.private == false &&
        (
          github.event_name == 'workflow_dispatch' ||
          (
            github.event_name == 'workflow_run' &&
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.event == 'push' &&
            github.event.workflow_run.head_branch == 'main'
          )
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    env:
      COMPONENT_PATH: custom_components/ok
      RELEASE_ASSET_NAME: ok.zip
    steps:
      - name: Require main branch for manual releases
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name != 'main' }}
        run: |
          echo "Manual releases must run from main."
          exit 1

      - name: Checkout release branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}

      - name: Confirm validated commit
        id: validated_commit
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          actual_sha="$(git rev-parse HEAD)"
          if [ "$actual_sha" != "$EXPECTED_SHA" ]; then
            echo "main moved after Validate completed."
            echo "Expected: $EXPECTED_SHA"
            echo "Actual:   $actual_sha"
            echo "Skipping release for this superseded validation run."
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "stale=false" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$EXPECTED_SHA" >> "$GITHUB_OUTPUT"

      - name: Prepare or publish semantic release
        id: release
        if: ${{ github.event_name != 'workflow_run' || steps.validated_commit.outputs.stale != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.validated_commit.outputs.commit_sha || github.sha }}
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "python-semantic-release==10.5.3"

          version="$(
            semantic-release version --print \
              | awk '/^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$/ { print; exit }'
          )"
          if [ -z "$version" ]; then
            {
              echo "released=false"
              echo "release_pr=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="$(
            semantic-release version --print-tag \
              | awk '/^v?[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$/ { print; exit }'
          )"
          if [ -z "$tag" ]; then
            echo "Unable to determine release tag."
            exit 1
          fi

          last_released="$(
            semantic-release version --print-last-released \
              | awk '/^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$/ { print; exit }'
          )"
          if [ "$version" = "$last_released" ]; then
            {
              echo "released=false"
              echo "release_pr=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          metadata_state="$(
            python3 - <<'PY' "$version" "$tag"
          from __future__ import annotations

          import json
          import re
          import sys
          import tomllib
          from pathlib import Path

          expected_version = sys.argv[1]
          expected_tag = sys.argv[2]

          pyproject_version = tomllib.loads(Path("pyproject.toml").read_text())["project"][
              "version"
          ]
          manifest_version = json.loads(
              Path("custom_components/ok/manifest.json").read_text()
          )["version"]
          api_match = re.search(
              r'__version__ = "([^"]+)"',
              Path("custom_components/ok/api/_version.py").read_text(),
          )
          api_version = api_match.group(1) if api_match else ""
          changelog_lines = Path("CHANGELOG.md").read_text().splitlines()
          changelog_has_tag = any(
              line == f"## {expected_tag}" or line.startswith(f"## {expected_tag} ")
              for line in changelog_lines
          )

          values = {
              "pyproject.toml": pyproject_version,
              "custom_components/ok/manifest.json": manifest_version,
              "custom_components/ok/api/_version.py": api_version,
          }
          mismatches = [
              f"{path}={actual}"
              for path, actual in values.items()
              if actual != expected_version
          ]
          if not changelog_has_tag:
              mismatches.append(f"CHANGELOG.md missing {expected_tag}")

          if mismatches:
              print("out_of_sync")
              print("\\n".join(mismatches), file=sys.stderr)
          else:
              print("synced")
          PY
          )"

          if [ "$metadata_state" != "synced" ]; then
            semantic-release version \
              --no-commit \
              --no-tag \
              --no-push \
              --no-vcs-release \
              --changelog \
              --skip-build

            release_branch="release/${tag}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git checkout -B "$release_branch"
            git add pyproject.toml custom_components/ok/manifest.json custom_components/ok/api/_version.py CHANGELOG.md
            if git diff --cached --quiet; then
              echo "Release metadata was out of sync, but semantic-release produced no changes."
              exit 1
            fi
            git commit -m "chore(release): ${tag}"
            git push --force-with-lease origin "$release_branch"

            pr_body="${RUNNER_TEMP}/release-pr.md"
            cat > "$pr_body" <<EOF
          Prepare ${tag} release metadata.

          This PR was generated after the validated main branch needed a semantic release.
          It keeps source-controlled version metadata aligned before the GitHub Release and HACS zip are published.
          EOF

            pr_number="$(
              gh pr list \
                --repo "$GITHUB_REPOSITORY" \
                --head "$release_branch" \
                --state open \
                --json number \
                --jq '.[0].number // ""'
            )"
            if [ -n "$pr_number" ]; then
              gh pr edit "$pr_number" --repo "$GITHUB_REPOSITORY" --body-file "$pr_body"
              pr_url="$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json url --jq .url)"
            else
              pr_url="$(
                gh pr create \
                  --repo "$GITHUB_REPOSITORY" \
                  --base main \
                  --head "$release_branch" \
                  --title "chore(release): ${tag}" \
                  --body-file "$pr_body"
              )"
            fi

            gh workflow run validate.yml --repo "$GITHUB_REPOSITORY" --ref "$release_branch"
            gh workflow run conventional-commits.yml \
              --repo "$GITHUB_REPOSITORY" \
              --ref "$release_branch" \
              -f title="chore(release): ${tag}"

            {
              echo "released=false"
              echo "release_pr=true"
              echo "version=$version"
              echo "tag=$tag"
              echo "pr_url=$pr_url"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          notes_file="${RUNNER_TEMP}/release-notes.md"
          awk -v tag="$tag" '
            $0 ~ "^## " tag "([ (]|$)" { capture = 1; print; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > "$notes_file"
          if [ ! -s "$notes_file" ]; then
            printf "Release %s\n" "$tag" > "$notes_file"
          fi

          asset_path="${RUNNER_TEMP}/${RELEASE_ASSET_NAME}"
          rm -f "$asset_path"
          python3 - <<'PY'
          from __future__ import annotations

          import os
          from pathlib import Path
          import zipfile

          component_path = Path(os.environ["COMPONENT_PATH"])
          asset_path = Path(os.environ["RUNNER_TEMP"]) / os.environ["RELEASE_ASSET_NAME"]
          with zipfile.ZipFile(asset_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for path in sorted(component_path.rglob("*")):
                  if not path.is_file():
                      continue
                  if "__pycache__" in path.parts or path.suffix == ".pyc":
                      continue
                  archive.write(path, path.relative_to(component_path))
          with zipfile.ZipFile(asset_path) as archive:
              if bad_file := archive.testzip():
                  raise RuntimeError(f"Created corrupt zip member: {bad_file}")
          PY

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset_path" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$tag" "$asset_path" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$RELEASE_SHA" \
              --title "$tag" \
              --notes-file "$notes_file"
          fi

          link="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json url --jq .url)"
          {
            echo "released=true"
            echo "release_pr=false"
            echo "version=$version"
            echo "tag=$tag"
            echo "commit_sha=$RELEASE_SHA"
            echo "link=$link"
          } >> "$GITHUB_OUTPUT"

      - name: Stop when validation run is superseded
        if: ${{ github.event_name == 'workflow_run' && steps.validated_commit.outputs.stale == 'true' }}
        run: echo "No release needed because a newer main commit has already been validated."

      - name: Stop when no release is needed
        if: >-
          ${{
            (github.event_name != 'workflow_run' || steps.validated_commit.outputs.stale != 'true') &&
            steps.release.outputs.released != 'true' &&
            steps.release.outputs.release_pr != 'true'
          }}
        run: echo "No release needed for this commit."

      - name: Summarize release PR
        if: ${{ steps.release.outputs.release_pr == 'true' }}
        run: |
          {
            echo "Prepared release metadata PR for ${{ steps.release.outputs.tag }}"
            echo
            echo "- Version: ${{ steps.release.outputs.version }}"
            echo "- Pull request: ${{ steps.release.outputs.pr_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize release
        if: ${{ steps.release.outputs.released == 'true' }}
        run: |
          {
            echo "Released ${{ steps.release.outputs.tag }}"
            echo
            echo "- Version: ${{ steps.release.outputs.version }}"
            echo "- Changelog: GitHub release notes"
            echo "- HACS asset: ${RELEASE_ASSET_NAME}"
            echo "- Release URL: ${{ steps.release.outputs.link }}"
          } >> "$GITHUB_STEP_SUMMARY"
