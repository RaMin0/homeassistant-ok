name: OK API behavior change
description: Report a suspected OK app API, command, authentication, or realtime update change.
title: "fix(api): "
labels:
  - api-change
body:
  - type: markdown
    attributes:
      value: |
        Do not paste passwords, tokens, `.storage` files, `secrets.yaml`, device identifiers, or unsanitized OK API captures.
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      description: Find this in HACS, the manifest, or the GitHub release you installed.
      placeholder: "0.3.0"
    validations:
      required: true
  - type: input
    id: home_assistant_version
    attributes:
      label: Home Assistant version
      placeholder: "2025.12.5"
    validations:
      required: true
  - type: dropdown
    id: affected_area
    attributes:
      label: Affected area
      options:
        - Login or reauthentication
        - Charger discovery
        - Connector status
        - Realtime updates
        - Start/stop charging
        - Scheduling
        - Energy prices
        - Receipts or last-session data
        - Other
    validations:
      required: true
  - type: textarea
    id: app_behavior
    attributes:
      label: OK app behavior
      description: Describe whether the same account/charger/action still works in the OK app.
    validations:
      required: true
  - type: textarea
    id: integration_behavior
    attributes:
      label: Home Assistant behavior
      description: Describe what changed in Home Assistant and when it started.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste only relevant, redacted Home Assistant logs.
      render: text
