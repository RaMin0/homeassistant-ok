start_charging:
  name: Start charging
  description: Start charging on an OK home charger connector.
  target:
    entity:
      integration: ok
      domain: sensor
      device_class: enum

schedule_charging:
  name: Schedule charging
  description: Schedule an OK home charging session.
  target:
    entity:
      integration: ok
      domain: sensor
      device_class: enum
  fields:
    scheduled_start:
      name: Scheduled start
      description: Local start date and time for the charging schedule.
      required: true
      selector:
        datetime:
    scheduled_end:
      name: Scheduled end
      description: Local end date and time for the charging schedule.
      required: true
      selector:
        datetime:

update_charging_schedule:
  name: Update charging schedule
  description: Update an existing OK charging schedule.
  target:
    entity:
      integration: ok
      domain: sensor
      device_class: enum
  fields:
    scheduled_start:
      name: Scheduled start
      description: Local start date and time for the updated charging schedule.
      required: true
      selector:
        datetime:
    scheduled_end:
      name: Scheduled end
      description: Local end date and time for the updated charging schedule.
      required: true
      selector:
        datetime:

cancel_charging_schedule:
  name: Cancel charging schedule
  description: Cancel an existing OK charging schedule.
  target:
    entity:
      integration: ok
      domain: sensor
      device_class: enum

stop_charging:
  name: Stop charging
  description: Stop an active OK charging session.
  target:
    entity:
      integration: ok
      domain: sensor
      device_class: enum

restart:
  name: Restart
  description: Restart an OK home charger.
  fields:
    device_id:
      name: Charger device
      description: Select the OK charger device.
      required: true
      selector:
        device:
          integration: ok

set_auto_start:
  name: Set auto start
  description: Enable or disable auto start on an OK home charger.
  fields:
    device_id:
      name: Charger device
      description: Select the OK charger device.
      required: true
      selector:
        device:
          integration: ok
    autostart:
      name: Auto start
      description: Whether the charger should start charging automatically when connected.
      required: true
      selector:
        boolean:
